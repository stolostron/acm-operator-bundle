    pac.test.appstudio.openshift.io/sha-title: |-
      ACM-34552 Watch OCM CA bundle via K8s API for PlacementDebugServer TLS trust (#6295)

      * ACM-34552 Watch OCM CA bundle via K8s API for PlacementDebugServer TLS trust

      Replace file-based cert loading with a Kubernetes API ConfigMap watcher
      that monitors ca-bundle-configmap in open-cluster-management-hub. This
      eliminates the need for operator reconciler code to copy the CA bundle.

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      * ACM-34552 Clear stale CA when relist finds no bundle

      Address CodeRabbit review: if a DELETED watch event is missed, the
      subsequent relist now clears currentCA when the ConfigMap or ca-bundle.crt
      key is absent, ensuring the route falls back to 503.

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      * ACM-34552 Add unit tests for placementDebugCAWatch

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      * ACM-34552 Address review: remove production-only guards

      - Move CA lookup inside agent cache check (agent.ts)
      - Use getPlacementDebugAgent() unconditionally, remove isProduction fallback
      - Start CA watcher in all environments, not just production
      - Add 503 test for unavailable CA bundle

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

