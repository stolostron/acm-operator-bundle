    pac.test.appstudio.openshift.io/sha-title: |-
      [ACM-6916] Update documentation for OCP 4.18+ and fix critical issues (#3900)

      * Update documentation for OCP 4.18+ and fix critical issues

      Fixes ACM-6916

      - Update disconnected-install-aws.md to use file-based catalogs (OCP 4.18+)
        - Replace deprecated opm index prune with file-based workflow
        - Update OCP version examples from 4.9/4.13 to 4.18
        - Add version compatibility notes for currently supported versions
        - Dynamic manifests directory detection

      - Fix installation.md critical issues
        - Update Go version requirement from 1.17+ to 1.25+
        - Fix all make commands to use Makefile.dev where appropriate
        - Remove references to non-existent targets (update-crds, update-manifest)
        - Add podman alternatives for all docker commands
        - Update opm requirement for file-based catalogs

      - Fix configuration.md YAML syntax error
        - Correct invalid "overrides: true" to proper object syntax

      - Update available-components.md with missing components
        - Add cnv-mtv-integrations (MTV for VM migration)
        - Add fine-grained-rbac (fine-grained RBAC policies)
        - Add siteconfig (SNO/cluster deployment automation)

      - Fix functional-tests-explained.md typo
        - "Testss" -> "Tests"

      - Delete obsolete multicloudhub-operator.md
        - Remove 196 lines of outdated IBM Multicloud Manager era documentation
        - Contained references to OCP 4.2, obsolete components (mongo, etcd),
          and non-existent MultiCloudFoundation Operator

      All changes align documentation with current codebase and supported OCP versions.

      Signed-off-by: dislbenn <dbennett@redhat.com>
      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      * Update docs/disconnected-install-aws.md

      Co-authored-by: coderabbitai[bot] <136622811+coderabbitai[bot]@users.noreply.github.com>
      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      * Update opm version to match Makefile pin (v1.15.1)

      CodeRabbit suggested pinning the opm version in the prerequisites to match
      the version specified in the Makefile (v1.15.1) instead of saying 'Latest
      version supporting file-based catalogs'.

      This ensures consistency between the documentation and the actual build
      tooling.

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      ---------

      Signed-off-by: dislbenn <dbennett@redhat.com>
      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>
