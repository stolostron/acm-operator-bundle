    pac.test.appstudio.openshift.io/sha: 062fe8cd9ac960d547554e4a40581941df11aa81
    pac.test.appstudio.openshift.io/sha-title: |-
      implement event-driven StatusReconciler (#2412)

      * test(status): implement event-driven StatusReconciler

      Refactor MCO status management into a dedicated StatusReconciler,
      replacing manual goroutines with event-driven logic. Centralize
      expected component names in pkg/config and fix cluster-scope
      consistency in tests. Use modern Go slice utilities for condition
      management and remove global state primitives.

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * add e2e test

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * add controller name

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * test(e2e): fix kubeconfig flag registration

      Check if 'kubeconfig' is already registered before declaring it to
      prevent panics. Update initVars to retrieve the flag value if it was
      pre-registered by a dependency.

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * add log

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * apply pause annotation

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * feat(status): improve observability of status reconciliation

      Add predicates to prevent infinite reconciliation loops caused by
      status updates. Enhance logging to output the specific changes made to
      conditions during status reconciliation, improving debuggability.

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      * fix image build

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>

      ---------

      Signed-off-by: Thibault Mange <22740367+thibaultmg@users.noreply.github.com>
