    pac.test.appstudio.openshift.io/sha-title: |-
      port resource proxy fallback + e2e setup from release-2.17 (#528) (#529)

      Cherry-pick functional and test changes from release-2.17 commit
      bf9477d into main:

      - argocd_agent_clusters.go: replace hardcoded resource-proxy-only URL
        with conditional fallback logic — prefer the in-cluster resource proxy
        service (Red Hat operator) but fall back to the external NodePort /
        LoadBalancer address when the service is absent (upstream argocd-
        operator / embedded e2e). Fail explicitly when neither is available.

      - argocd_agent_clusters_test.go: rename "override existing traditional
        cluster secret" test to clarify it exercises the resource-proxy path;
        add resource proxy Service to its existingObjects; add two new cases:
        "falls back to NodePort URL when no resource proxy service exists" and
        "fails when no resource proxy and no server address configured".

      - helpers_test.go: assert the resource proxy service exists before
        checking the cluster secret URL; add assertion that the URL contains
        "resource-proxy" (not just agentName=).

      - setup_env.sh: after the principal pod is Ready, create the
        openshift-gitops-agent-principal-resource-proxy ClusterIP Service on
        port 9090, mirroring what the Red Hat OpenShift GitOps operator does
        automatically. Without this service the embedded e2e falls back to
        NodePort and verifyClusterSecret fails its new assertion.

      - CLAUDE.md: update Cluster Secret key feature description and add
        "Resource proxy service in embedded e2e" gotcha entry.

      Signed-off-by: Xiangjing Li <xiangli@redhat.com>
      Co-authored-by: Cursor <cursoragent@cursor.com>
