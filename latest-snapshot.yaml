    pac.test.appstudio.openshift.io/sha: 1bbbfed6c442555719cac54399ce85bea686c911
    pac.test.appstudio.openshift.io/sha-title: |-
      feat: bump embedded operator to v1.21.0, add skip-reconcile annotation, remove CRD stubs (#553)

      - Update embedded Helm chart CRDs, ClusterRole rules, image SHAs, and
        Deployment template to match OpenShift GitOps Operator v1.21.0 CSV
      - Add argocd.argoproj.io/skip-reconcile=true annotation to agent cluster
        secrets so the hub application controller skips reconciliation for
        agent-managed applications (required for hybrid mode)
      - Remove Route and Monitoring CRD stubs from gitopsaddon; the v1.21.0
        operator handles missing APIs gracefully via argoutil.VerifyAPI and
        InspectCluster discovery checks
      - Add test-cycle.sh for automated deploy/verify/delete cycling against
        OCP and Kind managed clusters

      Signed-off-by: Mike Ng <ming@redhat.com>
      Co-authored-by: Mike Ng <ming@redhat.com>
