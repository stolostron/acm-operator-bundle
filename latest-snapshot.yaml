    pac.test.appstudio.openshift.io/sha-title: |-
      [ACM-29011] Add probe annotation constants and fix missing probeConfig in chart values (#3908)

      * Add probe annotation constants and probeConfig support

      Add probe annotation constants (MCH_READINESS_PROBE, MCH_LIVENESS_PROBE,
      MCH_STARTUP_PROBE) to pkg/utils/annotations.go and track their value
      changes in AnnotationsMatch function.

      Add missing probeConfig fields to values.yaml files across all chart
      templates to ensure probe annotations can be properly configured.

      Update validate-image-keys workflow to pin BUNDLE_BRANCH to release-2.17
      and fix Makefile.dev BUNDLE_BRANCH reference formatting.

      Signed-off-by: Disaiah Bennett <dislbenn@redhat.com>
      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Fix BUNDLE_BRANCH derivation to match actual branch naming

      Change BUNDLE_BRANCH_MAIN prefix from 'acm-' to 'release-' to match
      acm-operator-bundle branch naming convention (release-X.Y not acm-X.Y).

      Remove hardcoded BUNDLE_BRANCH from validate-image-keys workflow since
      automatic derivation now works correctly.

      Signed-off-by: Disaiah Bennett <dislbenn@redhat.com>
      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Fix probeConfig template checks to prevent map key errors

      Add hasKey checks before accessing probeConfig fields (timeoutSeconds,
      failureThreshold, successThreshold) to prevent "map has no entry for key"
      errors when probeConfig has partial fields set.

      Fixes template rendering failures in:
      - cluster-permission
      - grc-policy-propagator
      - multicloud-operators-subscription components

      Signed-off-by: Disaiah Bennett <dislbenn@redhat.com>
      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Regenerate templates with probeConfig hasKey fixes

      Run automation scripts (regenerate-charts, regenerate-charts-from-bundles)
      to apply updated probeConfig injection logic from installer-dev-tools PR #145.

      Changes:
      - Replace nested if statements with single hasKey checks
      - Reduces template lines from 5 to 3 per probe field
      - Applies to multicloud-operators-subscription templates
      - Updates fine-grained-rbac values.yaml

      Fixes "map has no entry for key" errors when probeConfig has partial fields.

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>
      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Remove redundant probeConfig outer if wrappers

      Remove outer {{- if .Values.hubconfig.probeConfig }} wrappers around hasKey
      checks. The hasKey checks already validate probeConfig exists via the and
      operator, making the outer if statement redundant.

      Changes:
      - grc-policy-propagator-deployment.yaml: Remove 2 outer if wrappers
      - cluster-permission.yaml: Remove 2 outer if wrappers

      Simplifies template logic and maintains consistency with automation-generated
      templates.

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>
      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Remove successThreshold from livenessProbe and startupProbe

      Kubernetes validation requires livenessProbe.successThreshold to be
      exactly 1, making it redundant to expose as a configurable parameter.

      This change removes successThreshold from livenessProbe and startupProbe
      templates while keeping it available for readinessProbe where it can be
      customized.

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      * Apply successThreshold readinessProbe-only fix via automation

      Ran automation scripts after installer-dev-tools PR #147 merged:
      - make regenerate-charts-from-bundles
      - make regenerate-charts
      - make copy-charts

      Automation correctly removed successThreshold from livenessProbe in
      multicluster-operators-subscription-report.yaml.

      Manually fixed cluster-permission.yaml which comes from backplane-operator
      via copy-charts (will need same fix applied to MCE).

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      * updated cluster-permission branch ref in copy-config

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      ---------

      Signed-off-by: Disaiah Bennett <dislbenn@redhat.com>
      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>
