    pac.test.appstudio.openshift.io/sha-title: |-
      Improve bundle-automation dependency handling (#3834)

      * Improve bundle-automation dependency handling

      This change simplifies how bundle-generation scripts and their
      dependencies are copied from installer-dev-tools, eliminating the need
      to manually track each dependency file.

      Changes:
      - Copy all .py files from bundle-generation/ using glob pattern
      - Automatically includes helper.py and any other shared modules
      - Removed manual dependency tracking list
      - Removed unused copy_scripts() and cleanup_scripts() functions
      - Added PYTHONPATH to ensure imports work correctly

      Benefits:
      - No manual dependency tracking - any new .py file automatically included
      - Future-proof - new shared modules work without code changes
      - Simpler code - replaced manual list with glob pattern
      - Fixes import issues with helper.py for OWNERS file syncing

      This change is required for the OWNERS file automation feature being
      added in installer-dev-tools, which introduces helper.py as a shared
      dependency.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Refactor to use helper functions with rglob

      Improves code organization by extracting file copy/cleanup logic into
      dedicated helper functions and using rglob() to recursively find all
      Python files while preserving directory structure.

      Changes:
      - Add copy_bundle_generation_files() helper function
      - Add cleanup_bundle_generation_files() helper function
      - Use rglob("*.py") to recursively find all Python files
      - Preserve directory structure when copying files
      - Simplify prepare_and_execute() function

      Signed-off-by: Dislene Bennett <dislbenn@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Fix script dependencies to support both bundle-generation and release directories

      The previous implementation only copied files from bundle-generation/,
      but operations like onboard-new-components and refresh-image-aliases
      reference scripts in release/ directory. This caused "Script not found"
      errors when running those operations.

      Changes:
      - Rename functions to copy_script_dependencies() and cleanup_script_dependencies()
      - Extract parent directory dynamically from script path
      - Support any subdirectory (bundle-generation/, release/, etc.)
      - More generic and maintainable than hardcoded directory checks

      Fixes issue where release/ scripts would fail to execute.

      Signed-off-by: Dislene Bennett <dislbenn@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Fix cleanup by tracking copied files before script execution

      The previous cleanup logic tried to rglob files from the source directory
      after script execution, but the executed scripts delete the tmp/ directory,
      so cleanup never ran. This left copied Python files in the directory.

      Changes:
      - copy_script_dependencies() now returns list of copied file paths
      - cleanup_script_dependencies() takes list of files to clean up
      - Files are tracked during copy phase, before tmp/ is deleted
      - Cleanup now runs successfully and removes all copied files

      Signed-off-by: Dislene Bennett <dislbenn@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      ---------

      Signed-off-by: dislbenn <dbennett@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
