    pac.test.appstudio.openshift.io/sha-title: |-
      [release-2.12] Mitigate node proxy RCE exposure (#2368)

      * Phase 1: Remove nodes/proxy permission from endpoint-observability-operator ClusterRole

      This removes the nodes/proxy RBAC permission from the ClusterRole deployed
      to managed clusters. This is the first step in mitigating the potential
      RCE exposure through the nodes/proxy API.

      Related to RCE mitigation effort.

      Signed-off-by: Subbarao Meduri <smeduri@redhat.com>

      * Phase 2: Remap kubelet scrape configs to use direct kubelet access

      This changes the three kubelet metrics scrape configurations to connect
      directly to kubelet on port 10250 instead of proxying through the
      Kubernetes API server. This eliminates the dependency on nodes/proxy
      permission, completing the RCE mitigation effort.

      Changes:
      - kubelet-metrics-cadvisor: Direct access to node:10250/metrics/cadvisor
      - kubelet-metrics-probes: Direct access to node:10250/metrics/probes
      - kubelet-metrics: Direct access to node:10250/metrics

      All three jobs now use:
      - __address__: ${node-name}:10250 (instead of kubernetes.default.svc:443)
      - __metrics_path__: /metrics/* (instead of /api/v1/nodes/${1}/proxy/metrics/*)

      Successfully tested on EKS cluster - all endpoints return HTTP 200 with
      valid metrics data when accessed directly with service account token.

      This completes the nodes/proxy RCE mitigation:
      - Phase 1: Removed nodes/proxy RBAC permission
      - Phase 2: Remapped scrape configs to direct kubelet access

      Signed-off-by: Subbarao Meduri <smeduri@redhat.com>

      ---------

      Signed-off-by: Subbarao Meduri <smeduri@redhat.com>
      Co-authored-by: Subbarao Meduri <smeduri@redhat.com>
