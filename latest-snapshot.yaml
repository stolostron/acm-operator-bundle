    pac.test.appstudio.openshift.io/sha-title: |-
      ACM-34489: Fix cluster links and empty-state copy for namespace-scoped users (#6294)

      Cluster names on the GRC policy Results tab rendered as clickable links
      even when the user lacked RBAC to view the cluster page, leading to
      empty/unhelpful navigation. The empty-state message was also misleading
      for namespace-scoped users.

      - Conditionally render cluster names as plain text when the cluster is
        not present in managedClustersState (namespace-scoped users cannot
        access the cluster-scoped ManagedCluster resource, so the atom is
        empty for them)
      - Update empty-state copy from "No cluster results" / "No clusters are
        reporting status for this policy." to "No results found" / "No results
        available."
      - Add tests for both the admin (links rendered) and namespace-scoped
        (plain text, updated empty state) scenarios

