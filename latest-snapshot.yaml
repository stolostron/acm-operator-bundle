    pac.test.appstudio.openshift.io/sha-title: |-
      ACM-35053: Bump helm.sh/helm/v3 from v3.18.4 to v3.20.2 to fix CVE-2026-35206 (#4307)

      * fix(deps): Bump helm.sh/helm/v3 from v3.18.4 to v3.20.2

      CVE-2026-35206: Helm path traversal vulnerability in `helm pull --untar`

      Signed-off-by: Amit Yadav <ayadav@redhat.com>

      * fix(deps): Update backplane-operator and controller-runtime for CVE-2026-35206

      Pull in backplane-operator fix from PR #3429 (backplane-2.8) which
      upgrades Helm to v3.20.2 for CVE-2026-35206. This requires upgrading
      controller-runtime from v0.19.4 to v0.23.1 for compatibility.

      - backplane-operator: updated to post-fix commit (c2fe078d16d8)
      - sigs.k8s.io/controller-runtime: v0.19.4 → v0.23.1
      - Webhook API migrated to controller-runtime v0.23.1 generics:
        webhook.Defaulter → admission.Defaulter[*MultiClusterHub]
        webhook.Validator → admission.Validator[*MultiClusterHub]
        builder.WebhookManagedBy replaces ctrl.NewWebhookManagedBy
      - Makefile: ENVTEST_K8S_VERSION 1.30 → 1.35, setup-envtest release-0.23

      )

      Signed-off-by: Amit Yadav <ayadav@redhat.com>

      * Fix unit test for ensureNamespaceAndPullSecret

      The fake client in controller-runtime 0.23+ now supports apply patching,
      so the test expectation needs to be inverted to expect success (nil error)
      instead of failure.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      ---------

