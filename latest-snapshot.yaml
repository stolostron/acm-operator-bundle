    pac.test.appstudio.openshift.io/sha-title: |-
      Remove legacy cleanup code (#3688)

      * Remove ACM 2.2, 2.5, 2.6, 2.7, 2.8 legacy cleanup code

      Remove legacy cleanup code for very old ACM versions (2.2-2.8). These versions
      are from 2021-2022 and users upgrading from those versions to current ACM 2.17
      would be doing a massive version jump spanning 3+ years.

      Changes:
      - Remove LegacyConfigKind, MCHLegacyPrometheusRules, MCHLegacyServiceMonitors
        and related helper functions from multiclusterhub_methods.go
      - Remove legacy cleanup tests from multiclusterhub_methods_test.go
      - Remove management-ingress and helm-repo component pruning from config.go
        (these were removed in ACM 2.7)
      - Remove cleanupGRCAppsub() call from reconcile.go (ACM 2.6->2.7 upgrade logic)
      - Remove ensureAppsubsGone() call from reconcile.go (2022 appsub migration)
      - Remove removeLegacyConfigurations() call from reconcile.go (ACM 2.2 cleanup)
      - Remove legacy GRC PrometheusRule/ServiceMonitor test from controller test
      - Remove SampleServiceMonitor test helper
      - Add documentation comments to metrics infrastructure functions

      Impact: Users on very old ACM versions (2.2-2.8) would need to manually clean
      up legacy resources, but this is an extremely unlikely upgrade path.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Remove SeparateCertificateManagement and appsub migration cleanup code

      Remove cleanup code for deprecated SeparateCertificateManagement functionality
      and 2022-era appsub migration. Both features are 3+ years old and users
      upgrading from those versions would be doing a massive version jump.

      SeparateCertificateManagement cleanup removal:
      - Add omitempty to SeparateCertificateManagement field (deprecated feature)
      - Remove CertManagerNS() helper function
      - Remove cert-manager namespace from TrackedNamespaces()
      - Remove uninstallList cleanup (ACM 2.5, 2.7 resources + cert-manager secret)
      - Remove ensureRemovalsGone() function
      - Remove call to ensureRemovalsGone() in reconcile loop
      - Remove related tests

      Appsub migration cleanup removal (2022):
      - Remove appsubCleanupList (old appsub subscription resources)
      - Remove ensureAppsubsGone() function (helmrelease/OADP cleanup)
      - Remove MonitoringAPIGroup constant (no longer used)
      - Remove unused imports (strings, utils, rbacv1, apimeta, ctrl, client)

      Impact: Simplifies codebase by removing 440 lines of upgrade cleanup logic
      for very old ACM versions. Users on these old versions would need manual
      cleanup, but this is an extremely unlikely upgrade path.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      ---------

      Signed-off-by: dislbenn <dbennett@redhat.com>
