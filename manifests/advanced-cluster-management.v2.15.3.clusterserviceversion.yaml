          - patch
          - delete
        - apiGroups:
          - ''
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: multiclusterhub-operator
      deployments:
      - label:
          control-plane: multiclusterhub-operator
        name: multiclusterhub-operator
        spec:
          replicas: 2
          selector:
            matchLabels:
              name: multiclusterhub-operator
          strategy: {}
          template:
            metadata:
              labels:
                name: multiclusterhub-operator
                ocm-antiaffinity-selector: multiclusterhub-operator
            spec:
              affinity:
                podAntiAffinity:
                  preferredDuringSchedulingIgnoredDuringExecution:
                  - podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                        - key: ocm-antiaffinity-selector
                          operator: In
                          values:
                          - multiclusterhub-operator
                      topologyKey: topology.kubernetes.io/zone
                    weight: 70
                  - podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                        - key: ocm-antiaffinity-selector
                          operator: In
                          values:
                          - multiclusterhub-operator
                      topologyKey: kubernetes.io/hostname
                    weight: 35
              containers:
              - args:
                - --leader-elect
                command:
                - multiclusterhub-operator
                env:
                - name: CRDS_PATH
                  value: /usr/local/templates/crds
                - name: TEMPLATES_PATH
                  value: /usr/local/templates
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: OPERAND_IMAGE_ACM_CLI
